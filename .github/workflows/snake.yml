name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *"  # 每12小时运行一次
  workflow_dispatch:          # 支持手动触发

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Snake (dark)
        uses: Platane/snk@v3
        with:
          github_user_name: darwinstudio
          outputs: |
            dist/github-snake-dark.svg?color_snake=green&color_dots=#00F5FF,#00D4FF,#00B4FF,#0094FF,#0074FF,#0054FF
            dist/github-snake.svg

      - name: Deploy to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
